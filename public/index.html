<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2D Hide and Seek - Prop Hunt</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
        /* A subtle shadow makes the constrained canvas pop against the dark background */
        canvas { background: #000; border: 2px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<!-- Set to your desired window size, which is smaller than the 1000x1000 map -->
<canvas id="gameCanvas" width="800" height="600"></canvas>

<!-- Import Libraries and Modules -->
<script src="/socket.io/socket.io.js"></script>
<script src="player.js"></script>
<script src="sprite_renderer.js"></script>
<script src="environment.js"></script>
<script src="camera.js"></script>
<script src="ConvertingToProp.js"></script>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const socket = io();

    // 1. INSTANTIATE MANAGERS
    const propManager = new ConvertingToProp('prop.png', 64, 64, 4);
    const playerController = new PlayerController(canvas.width, canvas.height);
    const spriteRenderer = new SpriteRenderer();
    const environmentRenderer = new EnvironmentRenderer();
    const camera = new Camera(canvas.width, canvas.height, 1000, 1000);

    environmentRenderer.loadMap('maps/level1.json');

    let localPlayers = {};
    let myId = null;
    let animFrameCounter = 0;
    let fKeyDebounce = false;
    const keys = { w: false, a: false, s: false, d: false };

    socket.on('connect', () => { myId = socket.id; });
    socket.on('currentPlayers', (players) => { localPlayers = players; });
    socket.on('newPlayer', (data) => { localPlayers[data.id] = data.player; });

    socket.on('stateUpdate', (serverPlayers) => {
        Object.keys(serverPlayers).forEach(id => {
            if (!localPlayers[id]) {
                localPlayers[id] = serverPlayers[id];
                return;
            }

            if (id !== myId) {
                localPlayers[id].targetX = serverPlayers[id].x;
                localPlayers[id].targetY = serverPlayers[id].y;
                localPlayers[id].direction = serverPlayers[id].direction;
                localPlayers[id].isMoving = serverPlayers[id].isMoving;
                localPlayers[id].role = serverPlayers[id].role;
                localPlayers[id].color = serverPlayers[id].color;
                
                // Sync disguise state
                localPlayers[id].isDisguised = serverPlayers[id].isDisguised;
                localPlayers[id].propType = serverPlayers[id].propType;
            } else {
                const distanceToServer = Math.hypot(localPlayers[myId].x - serverPlayers[id].x, localPlayers[myId].y - serverPlayers[id].y);
                if (distanceToServer > 45) {
                    localPlayers[myId].x = serverPlayers[id].x;
                    localPlayers[myId].y = serverPlayers[id].y;
                }
            }
        });
    });

    socket.on('gameStarted', (players) => { localPlayers = players; alert("Game Started!"); });
    socket.on('playerTagged', (data) => { if (localPlayers[data.id]) { localPlayers[data.id].role = 'spectator'; localPlayers[data.id].color = 'gray'; } });
    socket.on('gameOver', (data) => { alert(`Game Over! Winner: ${data.winner}`); });
    socket.on('playerDisconnected', (id) => { delete localPlayers[id]; });

    // 2. DETECT KEY DOWN TRANSFORM ACTION
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = true;

        if (key === 'f' && !fKeyDebounce) {
            fKeyDebounce = true;

            if (myId && localPlayers[myId]) {
                let p = localPlayers[myId];

                // Execute toggle logic via your new modular instance class
                const didTransform = propManager.executeToggle(p);

                if (didTransform) {
                    // Instantly emit the updated data state package over the web socket
                    socket.emit('playerMovement', {
                        x: p.x, y: p.y, direction: p.direction, isMoving: p.isMoving,
                        isDisguised: p.isDisguised, propType: p.propType
                    });
                }
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = false;
        if (key === 'f') fKeyDebounce = false;
    });

    // --- MAIN GAME LOOP ---
    function gameLoop(currentTime) {
        animFrameCounter++;

        // 1. Process local input and collisions
        if (myId && localPlayers[myId] && localPlayers[myId].role !== 'spectator') {
            playerController.updateLocalPlayer(localPlayers[myId], myId, localPlayers, socket, currentTime, environmentRenderer);
            camera.update(localPlayers[myId]);
        }

        // 2. Process interpolation for network players
        playerController.interpolateOtherPlayers(localPlayers, myId);

        // --- 3. RENDERING PHASE ---

        // Step A: Clear the absolute canvas viewport BEFORE transforming it
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Step B: Apply the camera offset context shift
        camera.apply(ctx);

        // Step C: Render all game objects
        environmentRenderer.render(ctx, canvas.width, canvas.height);
        
        // Pass the propManager directly into the SpriteRenderer so it handles drawing cleanly
        spriteRenderer.render(ctx, canvas, localPlayers, animFrameCounter, propManager, myId);

        // Step D: Remove the context shift so the next frame starts fresh
        camera.clear(ctx);

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
