<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2D Hide and Seek - Fixed Lag</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #eee; border: 2px solid #fff; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let localPlayers = {};
    let myId = null;
    const keys = { w: false, a: false, s: false, d: false };
    const speed = 4;
    const LERP_FACTOR = 0.12; // Adjusted slightly for 30Hz network updates

    let lastEmitTime = 0;
    const EMIT_INTERVAL = 30; // Only talk to server every 30ms max

    socket.on('connect', () => { myId = socket.id; });
    socket.on('currentPlayers', (players) => { localPlayers = players; });
    socket.on('newPlayer', (data) => { localPlayers[data.id] = data.player; });
    
    // --- THE FIX: Process the server batch state update ---
    socket.on('stateUpdate', (serverPlayers) => {
        Object.keys(serverPlayers).forEach(id => {
            if (!localPlayers[id]) {
                localPlayers[id] = serverPlayers[id];
                return;
            }

            if (id !== myId) {
                // Update target trajectories for other players
                localPlayers[id].targetX = serverPlayers[id].x;
                localPlayers[id].targetY = serverPlayers[id].y;
                localPlayers[id].role = serverPlayers[id].role;
                localPlayers[id].color = serverPlayers[id].color;
            } else {
                // Loose Server Reconciliation for local player
                const distanceToServer = Math.hypot(localPlayers[myId].x - serverPlayers[id].x, localPlayers[myId].y - serverPlayers[id].y);
                if (distanceToServer > 45) { 
                    localPlayers[myId].x = serverPlayers[id].x; 
                    localPlayers[myId].y = serverPlayers[id].y; 
                }
            }
        });
    });

    socket.on('gameStarted', (players) => { localPlayers = players; alert("Game Started!"); });
    socket.on('playerTagged', (data) => { if(localPlayers[data.id]) { localPlayers[data.id].role = 'spectator'; localPlayers[data.id].color = 'gray'; } });
    socket.on('gameOver', (data) => { alert(`Game Over! Winner: ${data.winner}`); });
    socket.on('playerDisconnected', (id) => { delete localPlayers[id]; });

    window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

    function gameLoop(currentTime) {
        // --- 1. CLIENT-SIDE PREDICTION ---
        if (myId && localPlayers[myId] && localPlayers[myId].role !== 'spectator') {
            let moved = false;
            let p = localPlayers[myId];

            if (keys.w && p.y > 15) { p.y -= speed; moved = true; }
            if (keys.s && p.y < canvas.height - 15) { p.y += speed; moved = true; }
            if (keys.a && p.x > 15) { p.x -= speed; moved = true; }
            if (keys.d && p.x < canvas.width - 15) { p.x += speed; moved = true; }

            // Throttled network emit to stop blocking Render's event loop
            if (moved && currentTime - lastEmitTime > EMIT_INTERVAL) {
                socket.emit('playerMovement', { x: p.x, y: p.y });
                lastEmitTime = currentTime;
                
                if (p.role === 'seeker') {
                    Object.keys(localPlayers).forEach(id => {
                        if (id !== myId && localPlayers[id].role === 'hider') {
                            let dist = Math.hypot(p.x - localPlayers[id].x, p.y - localPlayers[id].y);
                            if (dist < 30) socket.emit('playerTag', id);
                        }
                    });
                }
            }
        }

        // --- 2. LINEAR INTERPOLATION ---
        Object.keys(localPlayers).forEach(id => {
            if (id !== myId) {
                let p = localPlayers[id];
                if (p.targetX === undefined) { p.targetX = p.x; p.targetY = p.y; }
                
                p.x += (p.targetX - p.x) * LERP_FACTOR;
                p.y += (p.targetY - p.y) * LERP_FACTOR;
            }
        });

        // --- 3. RENDER FRAME ---
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        Object.keys(localPlayers).forEach(id => {
            let p = localPlayers[id];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.closePath();
            
            if(id === myId) {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        });

        requestAnimationFrame(gameLoop);
    }
    
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
